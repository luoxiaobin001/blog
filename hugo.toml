baseURL = "https://luoxiaobin001.github.io/blog/"
languageCode = "zh-cn"
title = "我的 Hugo 博客"
theme = "PaperMod"

# 开启 Draft 模式预览（部署时会自动忽略 draft: true 的文章）
buildDrafts = true

# 默认的语言设置
defaultContentLanguage = "zh-cn"

# 启用 Git 版本信息
enableGitInfo = true

# 生成摘要的设置
summaryLength = 70

# 菜单配置
[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 3
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 4

[params]
  description = "一个使用 GitHub Actions 自动部署的 Hugo 博客"
  
  # PaperMod 主题参数
  env = "production"
  mainSections = ["posts"]
  keyword = ["博客", "技术", "生活", "思考"]
  author = "博主"
  images = ["images/avatar.png"]
  
  # 显示设置
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowFullTextinRSS = true
  ShowAllPagesInArchive = true
  ShowPageNums = true
  
  # 主页配置
  ShowToc = true
  TocOpen = true
  ShowWordCount = true
  UseHugoToc = true
  
  # 社交链接
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/luoxiaobin001"
  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"
  
  # 搜索功能
  [params.fuseOptions]
    includeScore = true
  [params.search]
    disableIndex = false
  
  # 评论系统 (可选)
  # [params.comments]
  #   provider = "giscus"
  #   [params.comments.giscus]
  #     repo = "username/repo"
  #     repoId = ""
  #     category = "General"
  #     categoryId = ""
  #     mapping = "pathname"
  #     strict = "0"
  #     reactionsEnabled = "1"
  #     emitMetadata = "0"
  #     inputPosition = "bottom"
  #     lang = "zh-CN"

# 输出格式配置
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

# RSS 配置
[services]
  [services.rss]
    limit = 20
