<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <rect x="20" y="20" width="660" height="460" fill="#f8f9fa" stroke="#333" stroke-width="2"/>
  <text x="350" y="50" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Nginx Configuration Structure</text>
  
  <!-- Main Context -->
  <rect x="50" y="70" width="600" height="80" fill="#009639" rx="10"/>
  <text x="350" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Main Context (nginx.conf)</text>
  <text x="350" y="130" text-anchor="middle" font-size="12" fill="white">user, worker_processes, error_log, pid</text>
  
  <!-- Events -->
  <rect x="50" y="170" width="280" height="70" fill="#28a745" rx="10"/>
  <text x="190" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Events Block</text>
  <text x="190" y="220" text-anchor="middle" font-size="11" fill="white">worker_connections, multi_accept</text>
  
  <!-- HTTP -->
  <rect x="370" y="170" width="280" height="70" fill="#28a745" rx="10"/>
  <text x="510" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="white">HTTP Block</text>
  <text x="510" y="220" text-anchor="middle" font-size="11" fill="white">sendfile, keepalive_timeout</text>
  
  <!-- Server Blocks -->
  <rect x="50" y="260" width="280" height="70" fill="#17a2b8" rx="10"/>
  <text x="190" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Server Block 1</text>
  <text x="190" y="310" text-anchor="middle" font-size="11" fill="white">listen 80, server_name example.com</text>
  
  <rect x="370" y="260" width="280" height="70" fill="#17a2b8" rx="10"/>
  <text x="510" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Server Block 2</text>
  <text x="510" y="310" text-anchor="middle" font-size="11" fill="white">listen 443 ssl, server_name secure.com</text>
  
  <!-- Location Blocks -->
  <rect x="50" y="350" width="180" height="60" fill="#6c757d" rx="8"/>
  <text x="140" y="380" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Location /</text>
  <text x="140" y="395" text-anchor="middle" font-size="10" fill="white">root /var/www/html</text>
  
  <rect x="250" y="350" width="180" height="60" fill="#6c757d" rx="8"/>
  <text x="340" y="380" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Location /api</text>
  <text x="340" y="395" text-anchor="middle" font-size="10" fill="white">proxy_pass</text>
  
  <rect x="450" y="350" width="180" height="60" fill="#6c757d" rx="8"/>
  <text x="540" y="380" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Location /static</text>
  <text x="540" y="395" text-anchor="middle" font-size="10" fill="white">alias /var/www/static</text>
  
  <!-- Connecting Lines -->
  <line x1="350" y1="150" x2="190" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="350" y1="150" x2="510" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="190" y1="240" x2="190" y2="260" stroke="#333" stroke-width="2"/>
  <line x1="510" y1="240" x2="510" y2="260" stroke="#333" stroke-width="2"/>
</svg>
