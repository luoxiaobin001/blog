<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450">
  <rect x="20" y="20" width="660" height="410" fill="#f8f9fa" stroke="#009639" stroke-width="2"/>
  <text x="350" y="50" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Nginx Load Balancing</text>
  
  <!-- Clients -->
  <rect x="50" y="80" width="80" height="40" fill="#007bff" rx="5"/>
  <text x="90" y="105" text-anchor="middle" font-size="12" fill="white">Client 1</text>
  
  <rect x="50" y="140" width="80" height="40" fill="#007bff" rx="5"/>
  <text x="90" y="165" text-anchor="middle" font-size="12" fill="white">Client 2</text>
  
  <rect x="50" y="200" width="80" height="40" fill="#007bff" rx="5"/>
  <text x="90" y="225" text-anchor="middle" font-size="12" fill="white">Client 3</text>
  
  <!-- Nginx LB -->
  <rect x="250" y="130" width="150" height="90" fill="#009639" rx="10"/>
  <text x="325" y="165" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Nginx</text>
  <text x="325" y="185" text-anchor="middle" font-size="12" fill="white">Load Balancer</text>
  <text x="325" y="205" text-anchor="middle" font-size="11" fill="white">upstream backend</text>
  
  <!-- Backend Servers -->
  <rect x="520" y="80" width="120" height="50" fill="#6c757d" rx="5"/>
  <text x="580" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Server 1</text>
  <text x="580" y="118" text-anchor="middle" font-size="10" fill="white">weight=3</text>
  
  <rect x="520" y="150" width="120" height="50" fill="#6c757d" rx="5"/>
  <text x="580" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Server 2</text>
  <text x="580" y="188" text-anchor="middle" font-size="10" fill="white">weight=2</text>
  
  <rect x="520" y="220" width="120" height="50" fill="#6c757d" rx="5"/>
  <text x="580" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Server 3</text>
  <text x="580" y="258" text-anchor="middle" font-size="10" fill="white">weight=1</text>
  
  <!-- Arrows from clients to nginx -->
  <line x1="130" y1="100" x2="245" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="130" y1="160" x2="245" y2="170" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="130" y1="220" x2="245" y2="190" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Arrows from nginx to backends -->
  <line x1="400" y1="155" x2="515" y2="105" stroke="#009639" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="400" y1="175" x2="515" y2="175" stroke="#009639" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="400" y1="195" x2="515" y2="245" stroke="#009639" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#009639"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <rect x="150" y="350" width="400" height="60" fill="white" stroke="#ddd" rx="5"/>
  <text x="350" y="370" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Load Balancing Methods:</text>
  <text x="200" y="390" font-size="11" fill="#666">• Round Robin (default)</text>
  <text x="400" y="390" font-size="11" fill="#666">• Least Connections</text>
  <text x="200" y="405" font-size="11" fill="#666">• IP Hash</text>
  <text x="400" y="405" font-size="11" fill="#666">• Weighted Distribution</text>
</svg>
