<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="50" y="50" width="500" height="300" fill="#f8f9fa" stroke="#009639" stroke-width="2"/>
  <text x="300" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Nginx Architecture</text>
  
  <!-- Client -->
  <rect x="80" y="80" width="100" height="50" fill="#009639" rx="5"/>
  <text x="130" y="110" text-anchor="middle" font-size="14" fill="white">Client</text>
  
  <!-- Nginx Server -->
  <rect x="250" y="70" width="150" height="80" fill="#009639" rx="5"/>
  <text x="325" y="100" text-anchor="middle" font-size="14" fill="white">Nginx Server</text>
  <text x="325" y="120" text-anchor="middle" font-size="12" fill="white">Reverse Proxy</text>
  
  <!-- Backend Servers -->
  <rect x="450" y="80" width="80" height="50" fill="#6c757d" rx="5"/>
  <text x="490" y="110" text-anchor="middle" font-size="12" fill="white">Backend 1</text>
  
  <rect x="450" y="150" width="80" height="50" fill="#6c757d" rx="5"/>
  <text x="490" y="180" text-anchor="middle" font-size="12" fill="white">Backend 2</text>
  
  <rect x="450" y="220" width="80" height="50" fill="#6c757d" rx="5"/>
  <text x="490" y="250" text-anchor="middle" font-size="12" fill="white">Backend 3</text>
  
  <!-- Arrows -->
  <line x1="180" y1="105" x2="245" y2="105" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="110" x2="445" y2="105" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="130" x2="445" y2="175" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="150" x2="445" y2="245" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Labels -->
  <text x="210" y="95" font-size="11" fill="#666">Request</text>
  <text x="420" y="140" font-size="11" fill="#666">Load Balance</text>
</svg>
